<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slice & Conquer</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f1923; --surface:#162230; --card:#1e3045;
  --accent1:#ff6b35; --accent2:#ffd166;
  --accent3:#06d6a0; --accent4:#118ab2;
  --text:#f0f4f8; --muted:#8ba5be;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito';background:var(--bg);color:var(--text)}
.screen{display:none}
.screen.active{display:flex}

#intro{min-height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center}

h1{font-family:'Fredoka One';font-size:3rem;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.start-btn{padding:14px 40px;border:none;border-radius:50px;background:linear-gradient(135deg,var(--accent1),var(--accent2));font-size:1.2rem;cursor:pointer}

#game{flex-direction:column;padding:16px;gap:16px;max-width:600px;margin:auto}

.hud{display:flex;justify-content:space-between;background:var(--surface);padding:10px;border-radius:10px}

.question-card,.answer-section{background:var(--surface);padding:16px;border-radius:10px}

.choices-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.choice-btn{padding:12px;background:var(--card);border:none;border-radius:10px;cursor:pointer}
.choice-btn.correct{background:rgba(6,214,160,0.3)}
.choice-btn.wrong{background:rgba(255,107,53,0.3)}

.feedback{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}
.feedback.active{display:flex}
.feedback-card{background:var(--card);padding:20px;border-radius:12px;text-align:center}
</style>
</head>

<body>

<div id="intro" class="screen active">
  <h1>Slice & Conquer</h1>
  <p>Learn fraction division the easy way</p>

  <div>
    <b>💡 Quick Trick</b><br>
    Flip the second fraction and multiply<br>
    <b>a/b ÷ c/d → a/b × d/c</b>
  </div>

  <button class="start-btn" onclick="startGame()">Start</button>
</div>

<div id="game" class="screen">
  <div class="hud">
    <div>⭐ <span id="score">0</span></div>
    <div id="progress">Q1</div>
    <div id="lives">❤️❤️❤️</div>
  </div>

  <div class="question-card">
    <div id="question"></div>
    <div id="hint"></div>
  </div>

  <div class="answer-section">
    <div class="choices-grid" id="choices"></div>
  </div>
</div>

<div class="feedback" id="feedback">
  <div class="feedback-card">
    <h2 id="fbTitle"></h2>
    <p id="fbText"></p>
    <button onclick="nextQ()">Next</button>
  </div>
</div>

<script>

const QUESTIONS=[
 {n1:1,d1:2,n2:1,d2:4},
 {n1:3,d1:4,n2:1,d2:2},
 {n1:2,d1:3,n2:2,d2:3},
 {n1:5,d1:6,n2:1,d2:3},
 {n1:7,d1:8,n2:1,d2:4}
];

let i=0,score=0,lives=3,answered=false;

function gcd(a,b){return b?gcd(b,a%b):a}

function simp(n,d){let g=gcd(n,d);return {n:n/g,d:d/g}}

function startGame(){
 document.getElementById('intro').classList.remove('active');
 document.getElementById('game').classList.add('active');
 loadQ();
}

function loadQ(){
 answered=false;
 if(i>=QUESTIONS.length){alert('Game Over');location.reload();return}

 let q=QUESTIONS[i];
 let ans=simp(q.n1*q.d2,q.d1*q.n2);

 document.getElementById('question').innerHTML=`${q.n1}/${q.d1} ÷ ${q.n2}/${q.d2}`;
 document.getElementById('hint').innerText='Solve it';

 let choices=[ans,{n:ans.n+1,d:ans.d},{n:ans.n,d:ans.d+1},{n:ans.d,d:ans.n}];
 choices.sort(()=>Math.random()-0.5);

 let box=document.getElementById('choices');
 box.innerHTML='';

 choices.forEach(c=>{
  let btn=document.createElement('button');
  btn.className='choice-btn';
  btn.innerText=`${c.n}/${c.d}`;
  btn.onclick=()=>check(btn,c,ans);
  box.appendChild(btn);
 });

 document.getElementById('progress').innerText=`Q${i+1}`;
 document.getElementById('score').innerText=score;
 document.getElementById('lives').innerText='❤️'.repeat(lives);
}

function check(btn,c,ans){
 if(answered)return;
 answered=true;

 let correct=(c.n===ans.n && c.d===ans.d);

 document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);

 if(correct){
  btn.classList.add('correct');
  score+=10;
  showFB(true,ans);
 }else{
  btn.classList.add('wrong');
  lives--;
  showFB(false,ans);
 }
}

function showFB(ok,ans){
 document.getElementById('feedback').classList.add('active');
 document.getElementById('fbTitle').innerText= ok?'Correct':'Wrong';
 document.getElementById('fbText').innerHTML=`Answer = ${ans.n}/${ans.d}`;
}

function nextQ(){
 document.getElementById('feedback').classList.remove('active');
 i++;
 if(lives<=0){alert('No lives left');location.reload();return}
 loadQ();
}

</script>
</body>
</html>
